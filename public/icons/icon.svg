<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#10b981"/>
  <g transform="translate(256,256)">
    <!-- Wrench -->
    <g transform="rotate(-45)">
      <rect x="-20" y="-120" width="40" height="160" rx="8" fill="white"/>
      <circle cx="0" cy="-120" r="50" fill="none" stroke="white" stroke-width="24"/>
      <circle cx="0" cy="-120" r="20" fill="#10b981"/>
    </g>
    <!-- House -->
    <g transform="translate(0, 20)">
      <polygon points="0,-90 -80,0 -60,0 -60,60 60,60 60,0 80,0" fill="white" opacity="0.9"/>
      <rect x="-15" y="10" width="30" height="50" rx="4" fill="#10b981"/>
    </g>
  </g>
</svg>
