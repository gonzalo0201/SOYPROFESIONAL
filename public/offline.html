<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOYPROFESIONAL – Sin conexión</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a, #1e293b, #064e3b);
            color: white;
            text-align: center;
            padding: 2rem;
        }
        .container { max-width: 320px; }
        .icon {
            width: 80px; height: 80px;
            background: rgba(16, 185, 129, 0.15);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem;
        }
        .icon svg { width: 36px; height: 36px; color: #10b981; }
        h1 {
            font-size: 1.5rem; font-weight: 800;
            margin-bottom: 0.5rem;
        }
        h1 span { color: #10b981; }
        p { color: #94a3b8; font-size: 0.875rem; line-height: 1.6; margin-bottom: 1.5rem; }
        button {
            background: #10b981;
            color: white;
            border: none;
            padding: 0.875rem 2rem;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 0.875rem;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        button:active { transform: scale(0.97); }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8.288 15.038a5.25 5.25 0 0 1 7.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 0 1 1.06 0Z" />
            </svg>
        </div>
        <h1>SOY<span>PROFESIONAL</span></h1>
        <p>Parece que no tenés conexión a internet. Verificá tu WiFi o datos móviles y volvé a intentar.</p>
        <button onclick="window.location.reload()">Reintentar</button>
    </div>
</body>
</html>
